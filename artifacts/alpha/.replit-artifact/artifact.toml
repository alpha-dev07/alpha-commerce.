kind = "web"
previewPath = "/"
title = "Alpha"
version = "1.0.0"
id = "artifacts/alpha"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23961

[services.development]
run = "pnpm --filter @workspace/alpha run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/alpha", "run", "build" ]
publicDir = "artifacts/alpha/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23961"
BASE_PATH = "/"
